name: CI Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"
  TFPLAN_NAME: plan.tfplan
  ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}

permissions:
  # pull-requests: write
  contents: read
  actions: read

jobs:
  vars-test:
    name: vars-test
    runs-on: ubuntu-latest
    # container:
    #   image: registry.gitlab.com/iac58/andrzej/gitlab-runner-images/iac:latest
    #   options: --user 0
    env:
      job_env_var: ${{ vars.ORG_LEVEL_VAR }}
    steps:
    - name: Display workflow context
      run: |
        echo "Workflow: $GITHUB_WORKFLOW"
        echo "Repository: $GITHUB_REPOSITORY"
        echo "Branch: ${GITHUB_REF#refs/heads/}"
        echo "Commit: $GITHUB_SHA"
        echo "Actor: $GITHUB_ACTOR"
        echo "Event: $GITHUB_EVENT_NAME"
        echo "Runner OS: $RUNNER_OS"

    - name: Generate build metadata
      id: metadata
      run: |
        BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
        BUILD_NUMBER=$GITHUB_RUN_NUMBER
        VERSION_TAG=${GITHUB_REF#refs/tags/}

        echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
        echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
        echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV

    - name: Use generated variables
      run: |
        echo "Build Date: $BUILD_DATE"
        echo "Build Number: $BUILD_NUMBER"
        echo "Version: $VERSION_TAG"

    - name: test_script
      uses: actions/github-script@v9.0.0
      with:
        # github-token: ${{secrets.GITHUB_TOKEN}}
        script: |
          console.log('kapusta')

  tf-build:
    strategy:
      matrix:
        tfversion: [ "1.12", "1.14" ]
    runs-on: ubuntu-latest
    steps:
    - name: git-checkout
      uses: actions/checkout@v4

    - name: terraform-setup
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ${{ matrix.tfversion }}
  
    - name: Terraform fmt
      id: fmt
      run: terraform fmt -check

    - name: Terraform Init
      id: init
      run: terraform init -input=false

    - name: Cache Terraform plugins
      id: terraform-cache
      uses: actions/cache@v4
      with:
        path: .terraform
        key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
        restore-keys: |
          ${{ runner.os }}-terraform-
  
    - name: Cache Info
      if: steps.terraform-cache.outputs.cache-hit != 'true'
      run: echo "caching TF plugins"
  
    - name: Terraform Validate
      id: validate
      run: terraform validate -no-color

    - name: Terraform Plan
      id: plan
      run: terraform plan -no-color -input=false -out $TFPLAN_NAME

    - name: Upload Terraform Plan
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan-${{ matrix.tfversion }}
        path: |
          *.tfplan


  tf-release:
    runs-on: ubuntu-latest
    needs:
    - tf-build
    steps:
    - name: List and manage artifacts
      uses: actions/github-script@v7
      with:
        script: |
          // List artifacts for this repository
          const artifacts = await github.rest.actions.listArtifactsForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
          });

          console.log(`Found ${artifacts.data.total_count} artifacts`);
          for (const artifact of artifacts.data.artifacts) {
            console.log(`Artifact: ${artifact.name}`);
          }

    - name: git-checkout
      uses: actions/checkout@v4

    - name: terraform-setup
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: "1.14"
  
    - name: Download Terraform Plan
      uses: actions/download-artifact@v4
      with:
        name: terraform-plan-1.14
    - name: Terraform Init
      id: init
      run: terraform init -input=false

    - name: Terraform Apply
      run: |
        ls -la
        terraform -version
        terraform apply -no-color -input=false -auto-approve $TFPLAN_NAME
