name: Test Workflow

on:
  push:
    branches: ['*dev']

permissions:
  # pull-requests: write
  contents: read
  actions: read

# env var templating
env:
  APP_VERSION: ${{ github.ref_name }}
  BUILD_ID: ${{ github.run_number }}
  FULL_VERSION: ${{ github.ref_name }}-build.${{ github.run_number }}
  CONTAINER_TAG: ${{ github.repository }}:${{ github.ref_name }}

jobs:
  vars-test:
    name: vars-test
    runs-on: ubuntu-latest
    # container:
    #   image: registry.gitlab.com/iac58/andrzej/gitlab-runner-images/iac:latest
    #   options: --user 0
    env:
      job_env_var: ${{ vars.ORG_LEVEL_VAR }}
    steps:
    - name: Display workflow context
      run: |
        echo "Workflow: $GITHUB_WORKFLOW"
        echo "Repository: $GITHUB_REPOSITORY"
        echo "Branch: ${GITHUB_REF#refs/heads/}"
        echo "Commit: $GITHUB_SHA"
        echo "Actor: $GITHUB_ACTOR"
        echo "Event: $GITHUB_EVENT_NAME"
        echo "Runner OS: $RUNNER_OS"

    - name: Generate build metadata
      id: metadata
      run: |
        BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
        BUILD_NUMBER=$GITHUB_RUN_NUMBER
        VERSION_TAG=${GITHUB_REF#refs/tags/}

        echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
        echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
        echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV

    - name: Set environment-specific variables
      run: |
        if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo "LOG_LEVEL=info" >> $GITHUB_ENV
            echo "CACHE_TTL=3600" >> $GITHUB_ENV
        elif [ "$GITHUB_REF" = "refs/heads/develop" ]; then
            echo "LOG_LEVEL=debug" >> $GITHUB_ENV
            echo "CACHE_TTL=300" >> $GITHUB_ENV
        else
            echo "LOG_LEVEL=warn" >> $GITHUB_ENV
            echo "CACHE_TTL=60" >> $GITHUB_ENV
        fi

    - name: Use generated variables
      run: |
        echo "Build Date: $BUILD_DATE"
        echo "Build Number: $BUILD_NUMBER"
        echo "Version: $VERSION_TAG"
        echo "Log level: $LOG_LEVEL"
        echo "Cache TTL: $CACHE_TTL"

    - name: Example variable validation
      run: |
        required_vars=("APP_VERSION" "BUILD_ID" "FULL_VERSION")

        for var in "${required_vars[@]}"; do
            if [ -z "${!var}" ]; then
            echo "ERROR: Required environment variable $var is not set"
            exit 1
            else
            echo "OK: $var is set"
            fi
        done

    - name: test_script
      uses: actions/github-script@v9
      with:
        script: |
          console.log('kapusta')

  artifacts-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: generate artifact
      run: echo "sample data" > appdata.cfg

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: appdata-${{ github.sha }}
        path: |
          *.cfg
        retention-days: 1  

    - name: List and manage artifacts
      uses: actions/github-script@v9
      with:
        script: |
          // List artifacts for this repository
          const artifacts = await github.rest.actions.listArtifactsForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
          });

          console.log(`Found ${artifacts.data.total_count} artifacts`);
          for (const artifact of artifacts.data.artifacts) {
            console.log(`Artifact: ${artifact.name}`);
            console.log(artifact.workflow_run)
          }

          console.log(artifacts)
          console.log(artifacts.data)
          console.log(artifacts.data.artifacts[0].workflow_run)

  matrix-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        tf: [1.12, 1.14]
        include:
        - os: ubuntu-latest
          tf: 1.14
          target: production
        - os: ubuntu-latest
          command: "ls -la"
        - os: windows-latest
          command: "Get-ChildItem"
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: test_command
      run: ${{ matrix.command }}
    